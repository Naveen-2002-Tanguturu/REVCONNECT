<div class="auth-container">
    <div class="auth-card glass-card">
        <div class="auth-header">
            <div class="logo-circle">
                <img src="/assets/images/revconnect_new_logo.svg" alt="RevConnect Logo"
                    style="width: 40px; height: 40px; margin-top: 5px;">
            </div>
            <h1>Welcome Back</h1>
            <p>Sign in to your RevConnect account</p>
        </div>

        <div *ngIf="errorMessage" class="error-alert">
            <i class="fa-solid fa-triangle-exclamation"></i>
            {{ errorMessage }}
        </div>

        <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
            <div class="input-group">
                <label for="username">Username or Email</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user icon"></i>
                    <input type="text" id="username" name="usernameOrEmail" [(ngModel)]="credentials.usernameOrEmail"
                        required placeholder="Enter your username">
                </div>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock icon"></i>
                    <input [type]="showPassword ? 'text' : 'password'" id="password" name="password"
                        [(ngModel)]="credentials.password" required placeholder="••••••••" style="padding-right: 40px;">
                    <i class="fa-solid" [class.fa-eye]="!showPassword" [class.fa-eye-slash]="showPassword"
                        (click)="showPassword = !showPassword"
                        style="position: absolute; right: 15px; cursor: pointer; color: var(--text-secondary); pointer-events: auto; padding: 5px;"></i>
                </div>
            </div>

            <div class="auth-actions">
                <label class="remember-me">
                    <input type="checkbox" name="remember" [(ngModel)]="rememberMe">
                    <span>Remember me</span>
                </label>
                <a href="/forgot-password" class="forgot-link">Forgot password?</a>
            </div>

            <button type="submit" class="btn-primary login-btn" [disabled]="!loginForm.valid || isLoading">
                <i *ngIf="isLoading" class="fa-solid fa-circle-notch fa-spin"></i>
                <span>{{ isLoading ? 'Signing in...' : 'Sign In' }}</span>
            </button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="/register">Create one now</a></p>
        </div>
    </div>
</div>
