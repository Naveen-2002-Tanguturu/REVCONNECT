<div class="auth-container">
    <div class="auth-card glass-card">
        <div class="back-link" (click)="goBack()">
            <i class="fa-solid fa-arrow-left"></i> Back to Login
        </div>

        <div class="auth-header">
            <div class="logo-circle">
                <img src="/assets/images/revconnect_new_logo.svg" alt="RevConnect Logo"
                    style="width: 40px; height: 40px; margin-top: 5px;">
            </div>
            <h1>Secure Reset</h1>
            <p>Enter the 6-digit OTP from your email to set a new password.</p>
        </div>

        <div *ngIf="error" class="error-alert">
            <i class="fa-solid fa-triangle-exclamation"></i>
            {{ error }}
        </div>

        <div *ngIf="message" class="success-alert"
            style="background: rgba(46, 204, 113, 0.1); color: #2ecc71; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem;">
            <i class="fa-solid fa-check-circle"></i>
            {{ message }}
        </div>

        <form (ngSubmit)="onSubmit()" #resetForm="ngForm" *ngIf="!message">
            <div class="input-group">
                <label for="otp">6-Digit OTP</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-key icon"></i>
                    <input type="text" id="otp" name="otp" [(ngModel)]="otp" required
                        placeholder="Enter the OTP from your email" minlength="6" maxlength="6">
                </div>
            </div>

            <div class="input-group">
                <label for="newPassword">New Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock icon"></i>
                    <input [type]="showPassword ? 'text' : 'password'" id="newPassword" name="newPassword"
                        [(ngModel)]="newPassword" required placeholder="••••••••" minlength="6">
                    <i class="fa-solid password-toggle" [class.fa-eye]="!showPassword"
                        [class.fa-eye-slash]="showPassword" (click)="showPassword = !showPassword"></i>
                </div>
            </div>

            <div class="input-group">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock icon"></i>
                    <input [type]="showConfirmPassword ? 'text' : 'password'" id="confirmPassword"
                        name="confirmPassword" [(ngModel)]="confirmPassword" required placeholder="••••••••"
                        minlength="6">
                    <i class="fa-solid password-toggle" [class.fa-eye]="!showConfirmPassword"
                        [class.fa-eye-slash]="showConfirmPassword"
                        (click)="showConfirmPassword = !showConfirmPassword"></i>
                </div>
            </div>

            <button type="submit" class="btn-primary login-btn" [disabled]="!resetForm.valid || isSubmitting || !otp"
                style="margin-top: 1rem;">
                <i *ngIf="isSubmitting" class="fa-solid fa-circle-notch fa-spin"></i>
                <span>{{ isSubmitting ? 'Resetting...' : 'Change Password' }}</span>
            </button>
        </form>
    </div>
</div>
