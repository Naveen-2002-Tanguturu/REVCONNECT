<div class="auth-container">
    <div class="auth-card glass-card">
        <div class="back-link" (click)="goBack()">
            <i class="fa-solid fa-arrow-left"></i> Back to Login
        </div>

        <div class="auth-header">
            <div class="logo-circle">
                <i class="fa-solid fa-bolt"></i>
            </div>
            <h1>Forgot Password</h1>
            <p>Enter your email to receive a 6-digit OTP to reset your password.</p>
        </div>

        <div *ngIf="error" class="error-alert">
            <i class="fa-solid fa-triangle-exclamation"></i>
            {{ error }}
        </div>

        <div *ngIf="message" class="success-alert"
            style="background: rgba(46, 204, 113, 0.1); color: #2ecc71; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.75rem;">
            <i class="fa-solid fa-check-circle"></i>
            {{ message }}
        </div>

        <form (ngSubmit)="onSubmit()" #forgotForm="ngForm" *ngIf="!message">
            <div class="input-group">
                <label for="email" class="form-label"
                    style="display: block; margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.9rem; font-weight: 600;">Email
                    Address</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope icon"></i>
                    <input type="email" id="email" name="email" [(ngModel)]="email" required
                        placeholder="Enter your registered email">
                </div>
            </div>

            <button type="submit" class="btn-primary login-btn" [disabled]="!forgotForm.valid || isSubmitting"
                style="margin-top: 1rem;">
                <i *ngIf="isSubmitting" class="fa-solid fa-circle-notch fa-spin"></i>
                <span>{{ isSubmitting ? 'Sending OTP...' : 'Send OTP' }}</span>
            </button>
        </form>
    </div>
</div>
