<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      .form-control-plain {
  all: unset;          
  width: 100%;
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 4px;
}
    </style>

</head>
<body>

    <div class="container mt-5">
        <h1 class="text-center">University Search</h1>
        <div class="row justify-content-center mt-4">
            <div class="col-md-8 col-lg-6">
                <label for="country-input" class="form-label">Search by Country</label>
                <div class="input-group">
                    <input type="text" id="country-input" class="form-control-plain" placeholder="e.g. India, USA">
                    <button id="search-btn" class="btn btn-primary rounded">Search</button>
                </div>
            </div>
        </div>
        <div id="results-info" class="text-center mt-4 text-muted">
            Enter a country name and click Search to find universities.
        </div>
        <div id="university-grid" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 mt-3">
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const countryInput = document.getElementById('country-input');
            const searchBtn = document.getElementById('search-btn');
            const gridContainer = document.getElementById('university-grid');
            const resultsInfo = document.getElementById('results-info');

            const fetchData = async () => {
                const country = countryInput.value.trim();

                if (!country) {
                    alert('Please enter a country name.');
                    return;
                }

                gridContainer.innerHTML = '';
                resultsInfo.textContent = `Searching universities in ${country}...`;

                try {
                    const response = await fetch(`http://universities.hipolabs.com/search?country=${encodeURIComponent(country)}`);
                    if (!response.ok) throw new Error('Network error');

                    const data = await response.json();

                    if (data.length === 0) {
                        resultsInfo.textContent = `No universities found for "${country}".`;
                        gridContainer.innerHTML = `
                            <div class="col-12 text-center">
                                <p class="text-muted">No results found.</p>
                            </div>`;
                    } else {
                        resultsInfo.textContent = `${data.length} universities found in ${country}`;
                        renderUniversities(data);
                    }

                } catch (error) {
                    console.error('Error:', error);
                    resultsInfo.textContent = '';
                    gridContainer.innerHTML = `
                        <div class="col-12">
                            <div class="alert alert-danger text-center">
                                Failed to load data. Please try again.
                            </div>
                        </div>`;
                }
            };

            const renderUniversities = (universities) => {
                gridContainer.innerHTML = '';  

                let html = '';

                universities.forEach(uni => {
                    let location = uni.country;
                    if (uni['state-province']) {
                        location = uni['state-province'] + ', ' + uni.country;
                    }
                    html += `
                        <div class="col">
                            <div class="card">
                                <div class="card-body">
                                    <h5 class="card-title">${uni.name}</h5>
                                    <p class="card-text text-muted">${location}</p>
                                </div>
                            </div>
                        </div>`;
                });

                gridContainer.innerHTML = html;
            };
            searchBtn.addEventListener('click', fetchData);
            countryInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    fetchData();
                }
            });

            countryInput.focus();
        });
    </script>

</body>
</html>
