<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IMDB API</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

@media (max-width: 768px){
  #searchBtn{
    margin-top:10px;
    width:100%;
  }
}
</style>
</head>

<body>
<div class="container mt-4">
  <h2 class="text-center mb-4">IMDB API</h2>

  <div class="row mb-3 justify-content-center">
  <div class="col-md-6 col-lg-4">  
    <div class="input-group">
      <input type="text" id="searchInput" class="form-control" placeholder="Enter movie name...">
      <button class="btn btn-primary" id="searchBtn">Search</button>
    </div>
  </div>
</div>


  <p id="loading" style="display:none;">Loading...</p>
  <div id="errorDiv" class="alert alert-danger" style="display:none;"></div>

  <div id="resultsDiv" style="display:none;">
    <h5 id="resultCount"></h5>
    <table class="table table-bordered table-striped">
      <thead class="table-dark">
        <tr>
          <th>Poster</th>
          <th>ID</th>
          <th>Title</th>
          <th>Type</th>
          <th>Year</th>
          <th>Rating</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
const baseUrl = 'https://api.imdbapi.dev';

const searchBtn = document.getElementById('searchBtn');
const searchInput = document.getElementById('searchInput');
const loading = document.getElementById('loading');
const errorDiv = document.getElementById('errorDiv');
const resultsDiv = document.getElementById('resultsDiv');
const tableBody = document.getElementById('tableBody');
const resultCount = document.getElementById('resultCount');

searchBtn.addEventListener('click', () => {
  const query = searchInput.value.trim();
  if (!query) return alert('Enter movie name');
  fetchData(`/search/titles?query=${encodeURIComponent(query)}`);
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') searchBtn.click();
});

function fetchData(endpoint) {
  loading.style.display = 'block';
  errorDiv.style.display = 'none';
  resultsDiv.style.display = 'none';

  fetch(baseUrl + endpoint)
    .then(res => res.json())
    .then(data => showResults(data))
    .catch(() => {
      loading.style.display = 'none';
      errorDiv.textContent = 'Something went wrong';
      errorDiv.style.display = 'block';
    });
}

function showResults(data) {
  loading.style.display = 'none';
  tableBody.innerHTML = '';

  const items = data.results || data.titles || [];

  if (!items.length) {
    errorDiv.textContent = 'No results found';
    errorDiv.style.display = 'block';
    return;
  }

  resultCount.textContent = `Found ${items.length} results`;

  items.forEach(item => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td>${item.primaryImage?.url ? `<img src="${item.primaryImage.url}" width="50" height="70">` : '-'}</td>
      <td>${item.id || '-'}</td>
      <td>${item.primaryTitle || '-'}</td>
      <td>${item.type || '-'}</td>
      <td>${item.startYear || '-'}</td>
      <td>${item.rating?.aggregateRating || '-'}</td>
    `;
    tableBody.appendChild(row);
  });

  resultsDiv.style.display = 'block';
}
</script>
</body>
</html>
